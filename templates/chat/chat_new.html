{% extends "base.html" %}
{% block title %}New Chat — Chatbot{% endblock %}
{% block content %}
<div style="max-width:480px">
  <div class="page-header">
    <h1>New chat</h1>
  </div>
  <p class="text-muted" style="margin-bottom:24px">Give your conversation a name.</p>
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="id_title">Title</label>
      <input type="text" name="title" id="id_title" placeholder="e.g. Project brainstorm" autofocus>
      {% if form.title.errors %}
        {% for e in form.title.errors %}<div class="form-error">{{ e }}</div>{% endfor %}
      {% endif %}
    </div>
    <div class="flex-gap">
      <button type="submit" class="btn btn-primary">Create</button>
      <a href="{% url 'chat:list' %}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
