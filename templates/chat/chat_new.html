{% extends "base.html" %}
{% block title %}New Chat{% endblock %}
{% block content %}
<div style="max-width:480px;margin:0 auto;padding-top:24px">
  <h1 style="font-size:1.5rem;font-weight:700;margin-bottom:8px">New chat</h1>
  <p style="color:var(--text-muted);font-size:.9375rem;margin-bottom:28px">Give your conversation a title.</p>

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label for="id_title">Title</label>
      <input type="text" name="title" id="id_title" class="form-control"
             placeholder="e.g. Research on climate change" autofocus>
      {% if form.title.errors %}
        {% for err in form.title.errors %}<div class="form-error">{{ err }}</div>{% endfor %}
      {% endif %}
    </div>
    <div style="display:flex;gap:10px">
      <button type="submit" class="btn btn-primary">Create chat</button>
      <a href="{% url 'chat:list' %}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
