services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatbot}
      POSTGRES_USER: ${POSTGRES_USER:-chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot} -d ${POSTGRES_DB:-chatbot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Stdlib-only mock LLM server — no extra deps, mounts source read-only
  mock:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app:ro
    command: ["python", "mock_server/server.py", "--chat-port", "9000", "--embed-port", "9001"]
    environment:
      TEXT_EMBEDDING_DIM: "128"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/v1/models')\" 2>/dev/null && echo ok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # Milvus vector store and its dependencies (etcd + MinIO) are disabled while
  # RAG_ENABLED=false.  Uncomment all three services and the volumes below,
  # then set RAG_ENABLED=true in .env to re-enable the full RAG stack.
  #
  # milvus:
  #   image: milvusdb/milvus:v2.4.0
  #   environment:
  #     ETCD_ENDPOINTS: etcd:2379
  #     MINIO_ADDRESS: minio:9000
  #   ports:
  #     - "19530:19530"
  #   depends_on:
  #     - etcd
  #     - minio
  #   volumes:
  #     - milvus_data:/var/lib/milvus
  #
  # etcd:
  #   image: quay.io/coreos/etcd:v3.5.5
  #   environment:
  #     ETCD_AUTO_COMPACTION_MODE: revision
  #     ETCD_AUTO_COMPACTION_RETENTION: "1000"
  #     ETCD_QUOTA_BACKEND_BYTES: "4294967296"
  #     ETCD_SNAPSHOT_COUNT: "50000"
  #   command: >
  #     etcd
  #     --advertise-client-urls http://0.0.0.0:2379
  #     --listen-client-urls http://0.0.0.0:2379
  #     --data-dir /etcd
  #
  # minio:
  #   image: minio/minio:latest
  #   environment:
  #     MINIO_ACCESS_KEY: minioadmin
  #     MINIO_SECRET_KEY: minioadmin
  #   command: server /data --console-address ":9001"
  #   volumes:
  #     - minio_data:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      POSTGRES_HOST: postgres
      # Point at the mock LLM service (overrides .env values inside docker)
      CHAT_BASE_URL: http://mock:9000/v1
      CHAT_MODEL: openai/mock-chat
      VISION_MODEL: openai/mock-chat
      EMBEDDING_BASE_URL: http://mock:9001/v1
      RERANKER_BASE_URL: http://mock:9001/v1
      TEXT_EMBEDDING_MODEL: openai/mock-embed
      RAG_ENABLED: "false"
      TOOL_CALLS_ENABLED: "false"
    volumes:
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mock:
        condition: service_healthy
    command: >
      sh -c "uv run python manage.py migrate --settings=config.settings.production &&
             uv run python manage.py sync_builtin_tools --settings=config.settings.production &&
             uv run gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      POSTGRES_HOST: postgres
      CHAT_BASE_URL: http://mock:9000/v1
      CHAT_MODEL: openai/mock-chat
      EMBEDDING_BASE_URL: http://mock:9001/v1
      RERANKER_BASE_URL: http://mock:9001/v1
      TEXT_EMBEDDING_MODEL: openai/mock-embed
      RAG_ENABLED: "false"
      TOOL_CALLS_ENABLED: "false"
    volumes:
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      mock:
        condition: service_healthy
    command: >
      sh -c "uv run python manage.py migrate --settings=config.settings.production &&
             uv run python manage.py run_ingestion_worker --settings=config.settings.production"

volumes:
  postgres_data:
  media_data:
  # milvus_data:
  # minio_data:
