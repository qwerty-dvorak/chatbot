services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatbot}
      POSTGRES_USER: ${POSTGRES_USER:-chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot} -d ${POSTGRES_DB:-chatbot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local document file server — stores files at docs_data:/data/docs/<user>/<date>/<category>/
  file-server:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app:ro
      - docs_data:/data/docs
    command: ["python", "file_server/server.py"]
    environment:
      DOCS_ROOT: /data/docs
      FILE_SERVER_PORT: "8888"
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8888/browse')\" 2>/dev/null && echo ok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # Mock LLM server — stdlib only, supports streaming + tool calls
  mock:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app:ro
    command: ["python", "mock_server/server.py", "--chat-port", "9000", "--embed-port", "9001"]
    environment:
      TEXT_EMBEDDING_DIM: "128"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/v1/models')\" 2>/dev/null && echo ok"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # Milvus + etcd + MinIO disabled — uncomment and set RAG_ENABLED=true to enable
  # milvus: ...
  # etcd: ...
  # minio: ...

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      POSTGRES_HOST: postgres
      DOCS_ROOT: /data/docs
      CHAT_BASE_URL: http://mock:9000/v1
      CHAT_MODEL: openai/mock-chat
      VISION_MODEL: openai/mock-chat
      EMBEDDING_BASE_URL: http://mock:9001/v1
      RERANKER_BASE_URL: http://mock:9001/v1
      TEXT_EMBEDDING_MODEL: openai/mock-embed
      RAG_ENABLED: "false"
      TOOL_CALLS_ENABLED: "true"
    volumes:
      - media_data:/app/media
      - docs_data:/data/docs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mock:
        condition: service_healthy
      file-server:
        condition: service_healthy
    command: >
      sh -c "uv run python manage.py migrate --settings=config.settings.production &&
             uv run python manage.py sync_builtin_tools --settings=config.settings.production &&
             uv run gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      POSTGRES_HOST: postgres
      DOCS_ROOT: /data/docs
      CHAT_BASE_URL: http://mock:9000/v1
      CHAT_MODEL: openai/mock-chat
      EMBEDDING_BASE_URL: http://mock:9001/v1
      RERANKER_BASE_URL: http://mock:9001/v1
      TEXT_EMBEDDING_MODEL: openai/mock-embed
      RAG_ENABLED: "false"
      TOOL_CALLS_ENABLED: "true"
    volumes:
      - media_data:/app/media
      - docs_data:/data/docs
    depends_on:
      postgres:
        condition: service_healthy
      mock:
        condition: service_healthy
      file-server:
        condition: service_healthy
    command: >
      sh -c "uv run python manage.py migrate --settings=config.settings.production &&
             uv run python manage.py run_ingestion_worker --settings=config.settings.production"

volumes:
  postgres_data:
  media_data:
  docs_data:
  # milvus_data:
  # minio_data:
