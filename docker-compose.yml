services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chatbot}
      POSTGRES_USER: ${POSTGRES_USER:-chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "uv run python manage.py migrate --settings=config.settings.production &&
             uv run gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"

  worker:
    build: .
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - .:/app
      - media_data:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uv", "run", "python", "manage.py", "run_ingestion_worker", "--settings=config.settings.production"]

volumes:
  postgres_data:
  media_data:
